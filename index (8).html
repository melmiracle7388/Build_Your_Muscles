<script>
// ── SERVICE WORKER FOR NOTIFICATIONS ──
if('serviceWorker' in navigator){
  const sw = `
    self.addEventListener('install', e => self.skipWaiting());
    self.addEventListener('activate', e => self.clients.claim());
    self.addEventListener('notificationclick', e => {
      e.notification.close();
      e.waitUntil(clients.openWindow('/'));
    });
  `;
  const blob = new Blob([sw], {type:'application/javascript'});
  const swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl).catch(()=>{});
}

// ── NOTIFICATION SCHEDULER ──
window.BYM_NOTIF = {
  async requestPermission(){
    if(!('Notification' in window)) return false;
    const perm = await Notification.requestPermission();
    return perm === 'granted';
  },

  async send(title, body, delay=0){
    if(Notification.permission !== 'granted') return;
    setTimeout(()=>{
      try{
        if(navigator.serviceWorker.controller){
          navigator.serviceWorker.ready.then(reg=>{
            reg.showNotification(title,{body,icon:"data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23C9A84C'/><text y='.9em' font-size='70' x='15'>💪</text></svg>",badge:"data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23C9A84C'/><text y='.9em' font-size='70' x='15'>💪</text></svg>",vibrate:[200,100,200]});
          });
        } else {
          new Notification(title,{body});
        }
      }catch(e){}
    }, delay);
  },

  scheduleHabit(label, timeStr){
    if(Notification.permission !== 'granted') return;
    const [h,m] = timeStr.split(':').map(Number);
    const now = new Date();
    const target = new Date();
    target.setHours(h, m, 0, 0);
    if(target <= now) target.setDate(target.getDate() + 1);
    const delay = target - now;
    // Store in localStorage so it persists
    const key = 'bym_notif_' + label.replace(/\s/g,'_');
    const existing = localStorage.getItem(key);
    if(existing === timeStr) return; // already scheduled
    localStorage.setItem(key, timeStr);
    setTimeout(()=>{
      this.send('Build Your Muscles 💪', 'Time for: ' + label);
      localStorage.removeItem(key); // remove after firing
    }, delay);
  },

  scheduleAll(habits){
    habits.forEach(h => {
      if(h.enabled !== false) this.scheduleHabit(h.label, h.time);
    });
  },

  async enableAll(habits){
    const granted = await this.requestPermission();
    if(!granted){
      alert('Please allow notifications to receive habit reminders!');
      return false;
    }
    this.scheduleAll(habits);
    // Water reminder every 2 hours
    this.send('💧 Water Reminder', 'Time to drink a glass of water! Stay hydrated.', 2*60*60*1000);
    this.send('💧 Water Reminder', 'Halfway through the day — drink some water!', 4*60*60*1000);
    // Morning motivation
    this.scheduleHabit('Good morning! Check your daily plan 🌅', '07:00');
    return true;
  }
};

// Auto-schedule if already granted
if(Notification.permission === 'granted'){
  try{
    const habits = JSON.parse(localStorage.getItem('bym_habits2') || '[]');
    if(habits.length > 0) window.BYM_NOTIF.scheduleAll(habits);
  }catch(e){}
}
</script>

function extractJSON(text){
  try{return JSON.parse(text.trim());}catch(e){}
  const m=text.match(/\{[\s\S]*\}/);
  if(m){try{return JSON.parse(m[0]);}catch(e){}}
  throw new Error("Could not parse AI response. Please try again.");
}

async function callAI(sys,msg,onChunk){
  const r=await fetch(GROQ_URL,{
    method:"POST",
    headers:{"Content-Type":"application/json","Authorization":`Bearer ${GROQ_KEY}`},
    body:JSON.stringify({model:"llama-3.3-70b-versatile",max_tokens:1400,stream:true,temperature:0.2,
      messages:[{role:"system",content:sys},{role:"user",content:msg}]})
  });
  if(!r.ok){const t=await r.text();throw new Error("API error "+r.status);}
  const reader=r.body.getReader();const dec=new TextDecoder();let full="";
  while(true){
    const{done,value}=await reader.read();if(done)break;
    for(const line of dec.decode(value).split("\n")){
      if(line.startsWith("data:")){const d=line.slice(5).trim();if(d==="[DONE]")break;
        try{const j=JSON.parse(d);const c=j.choices?.[0]?.delta?.content;if(c){full+=c;if(onChunk)onChunk(full);}}catch(e){}
      }
    }
  }
  return full;
}

function BMIChart({updates,currentBMI}){
  const profile=JSON.parse(localStorage.getItem("bym_profile")||"{}");
  const hM=profile.height?(+profile.height/100):null;
  let pts=updates.filter(u=>u.weight&&hM).map(u=>({date:u.date,bmi:+(+u.weight/(hM*hM)).toFixed(1)}));
  if(pts.length===0&&currentBMI)pts=[{date:"Now",bmi:currentBMI}];
  if(!pts.length)return null;
  const vals=pts.map(p=>p.bmi),minV=Math.min(...vals,16),maxV=Math.max(...vals,33),range=maxV-minV||1;
  const W=520,H=100,PL=32,PR=12,PT=18,PB=20;
  const cx=i=>PL+(i/Math.max(pts.length-1,1))*(W-PL-PR);
  const cy=v=>PT+(1-(v-minV)/range)*(H-PT-PB);
  const bc=b=>b<18.5?"#378ADD":b<25?"#6aaa3a":b<30?G:"#E24B4A";
  return(
    <GC style={{marginBottom:14}}>
      <GL>BMI PROGRESS CHART</GL>
      <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height:H}}>
        {[18.5,25,30].map(v=><g key={v}><line x1={PL} y1={cy(v)} x2={W-PR} y2={cy(v)} stroke="#1e1e1e" strokeWidth="1" strokeDasharray="4,4"/><text x={PL-4} y={cy(v)} textAnchor="end" dominantBaseline="middle" fontSize="9" fill="#444">{v}</text></g>)}
        {pts.length>1&&<polyline fill="none" stroke={G} strokeWidth="2" strokeLinejoin="round" points={pts.map((p,i)=>`${cx(i)},${cy(p.bmi)}`).join(" ")}/>}
        {pts.map((p,i)=><g key={i}><circle cx={cx(i)} cy={cy(p.bmi)} r={5} fill={bc(p.bmi)} stroke="#080808" strokeWidth="2"/><text x={cx(i)} y={cy(p.bmi)-10} textAnchor="middle" fontSize="9" fill={bc(p.bmi)} fontWeight="700">{p.bmi}</text><text x={cx(i)} y={H-3} textAnchor="middle" fontSize="8" fill="#333">{(p.date||"").split(" ").slice(0,2).join(" ")}</text></g>)}
      </svg>
      <div style={{display:"flex",gap:12,marginTop:6,flexWrap:"wrap"}}>
        {[["#378ADD","Underweight"],["#6aaa3a","Healthy"],["#C9A84C","Overweight"],["#E24B4A","Obese"]].map(([c,l])=><div key={l} style={{display:"flex",alignItems:"center",gap:4}}><div style={{width:8,height:8,borderRadius:"50%",background:c}}/><span style={{fontSize:10,color:"#444"}}>{l}</span></div>)}
      </div>
    </GC>
  );
}

Person details: Age ${P.age}, Gender ${P.gender}, Height ${P.height}cm, Weight ${P.weight}kg, Goal: ${P.goal}, Workout split: ${wt.name}, Diet preference: ${P.dietPref}, Health condition: ${P.condition}, Dietary restriction: ${P.restriction}.

The JSON must have this exact structure:

      localStorage.setItem("bym_profile",JSON.stringify(P));
      setPlanTab("a");
      setTab("plan");

      // Generate Week B in background
      setTimeout(async()=>{
        try{
          const p2 = userPrompt.replace("Generate a 7-day personalised fitness plan","Generate a DIFFERENT 7-day fitness plan for WEEK B. Use different exercises from Week A but keep the same workout split");
          const r2 = await fetch(GROQ_URL,{
            method:"POST",
            headers:{"Content-Type":"application/json","Authorization":`Bearer ${GROQ_KEY}`},
            body:JSON.stringify({model:"llama-3.3-70b-versatile",max_tokens:2500,temperature:0.1,stream:false,
              messages:[{role:"system",content:systemPrompt},{role:"user",content:p2}]})
          });
          if(r2.ok){
            const d2=await r2.json();
            const t2=d2.choices[0].message.content;
            let p2parsed;
            try{p2parsed=JSON.parse(t2.trim());}catch(e){const m=t2.match(/\{[\s\S]*\}/);if(m)p2parsed=JSON.parse(m[0]);}
            if(p2parsed){setWeekB(p2parsed);localStorage.setItem("bym_week_b",JSON.stringify(p2parsed));}
          }
        }catch(e){console.log("Week B skipped");}
      },1000);

    }catch(err){
      console.error("Plan error:", err);
      alert("Error: "+err.message);
    }
    clearInterval(iv);
    setLoading(false);
  }
  async function sendChat(){
    if(!chatIn.trim()||chatLoad)return;
    const q=chatIn.trim();setChatIn("");
    setMsgs(m=>[...m,{role:"user",text:q},{role:"ai",text:""}]);
    setChatLoad(true);
    try{await callAI(sys(),q,(t)=>setMsgs(m=>[...m.slice(0,-1),{role:"ai",text:t}]));}
    catch(e){setMsgs(m=>[...m.slice(0,-1),{role:"ai",text:"Connection error. Please try again!"}]);}
    setChatLoad(false);
  }

    setUpForm({weight:"",waist:"",energy:"Medium",days:""});

          <div style={{display:"flex",gap:6,marginBottom:14,overflowX:"auto",paddingBottom:4}}>
            {[["guide","📚 Fitness 101"],["chat","🤖 AI Coach"]].map(([t,lb])=>(
              <button key={t} onClick={()=>setSub(t)} style={{padding:"8px 14px",borderRadius:10,background:sub===t?G:"#111",color:sub===t?"#080808":"#555",fontSize:13,fontWeight:sub===t?700:400,border:`1px solid ${sub===t?G:"#222"}`,whiteSpace:"nowrap",flexShrink:0}}>{lb}</button>
            ))}
          </div>
          {sub==="guide"&&<BeginnerGuide/>}
          {sub==="chat"&&(
            <div style={{display:"flex",flexDirection:"column",height:"calc(100vh - 180px)"}}>
              <div style={{marginBottom:12}}>
                <div style={{fontSize:9,color:G,letterSpacing:"2px",marginBottom:4}}>MEL MIRACLE AI COACH</div>
                <h1 style={{fontSize:20,fontWeight:800,color:"#f0e8d8",fontFamily:"Georgia,serif"}}>Ask Me Anything</h1>
                <p style={{fontSize:11,color:"#333",marginTop:2}}>Fitness, diet, sleep, mindset — I am here to help!</p>
              </div>
              <div style={{flex:1,overflowY:"auto",display:"flex",flexDirection:"column",gap:10,paddingBottom:14}}>
                {msgs.map((m,i)=>(
                  <div key={i} style={{display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start"}}>
                    {m.role==="ai"&&<div style={{width:30,height:30,borderRadius:"50%",background:"#0d0900",border:`1px solid ${G}33`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,marginRight:8,flexShrink:0,marginTop:2}}>💪</div>}
                    <div style={{maxWidth:"80%",padding:"11px 15px",borderRadius:m.role==="user"?"16px 16px 4px 16px":"4px 16px 16px 16px",background:m.role==="user"?G:"#0f0f0f",color:m.role==="user"?"#080808":"#c8c0b4",fontSize:14,lineHeight:1.7,border:m.role==="ai"?"1px solid #1a1a1a":"none",whiteSpace:"pre-wrap"}}>
                      {m.text||<Spin/>}
                    </div>
                  </div>
                ))}
                <div ref={chatRef}/>
              </div>
              <div style={{borderTop:"1px solid #111",paddingTop:12,display:"flex",gap:8}}>
                <input value={chatIn} onChange={e=>setChatIn(e.target.value)} onKeyDown={e=>e.key==="Enter"&&!e.shiftKey&&sendChat()} placeholder="Ask about workouts, diet, sleep, mindset..." style={{flex:1}}/>
                <button onClick={sendChat} disabled={chatLoad||!chatIn.trim()} style={{padding:"12px 18px",borderRadius:10,fontWeight:700,fontSize:14,transition:"all .2s",background:chatLoad||!chatIn.trim()?"#111":G,color:chatLoad||!chatIn.trim()?"#333":"#080808"}}>
                  {chatLoad?<Spin/>:"Send"}
                </button>
              </div>
            </div>
          )}
        </div>
      )}

      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
